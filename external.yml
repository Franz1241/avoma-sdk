openapi: 3.0.0
info:
  title: Reusable external API components
  version: 1.0.0
paths: {}
components:
  schemas:
    http_error_response:
      type: object
      required:
        - detail
      properties:
        detail:
          type: string
          description: Not Found
          example: Not Found
    unauthorized_error_response:
      type: object
      required:
        - detail
      properties:
        detail:
          type: string
          description: 'Invalid Client Key or Secret'
          example: 'Invalid Client Key or Secret'
    permission_denied:
      type: object
      required:
        - detail
      properties:
        detail:
          type: string
          description: 'You do not have permission to perform this action.'
          example: 'You do not have permission to perform this action.'
    rate_limit_error_response:
      type: object
      required:
        - detail
      properties:
        detail:
          type: string
          description: 'You have exceeded the daily download limit'
          example: 'You have exceeded the daily download limit'
    smart_category_settings_request:
      type: object
      required:
        - name
        - settings
        - prompts
        - keywords
      properties:
        name:
          type: string
          description: Name of the smart category
        settings:
          type: object
          description: Settings of the smart category
          properties:
            aug_notes_enabled:
              type: boolean
              description: Bookmark and transcript highlight
            prompt_extract_strategy:
              type: string
              enum:
                - after
                - before
                - contains
              description: Prompt extract strategy
            prompt_extract_length:
              type: string
              enum:
                - short
                - medium
                - long
              description: Prompt extract length
            keyword_notes_enabled:
              type: boolean
              description: Keyword notes enabled
        prompts:
          type: array
          description: Prompts of the smart category
          items:
            type: string
        keywords:
          type: array
          description: Keywords of the smart category
          items:
            type: string
    smart_category_update_request:
      type: object
      properties:
        settings:
          type: object
          description: Settings of the smart category
          properties:
            aug_notes_enabled:
              type: boolean
              description: Bookmark and transcript snippet
            prompt_extract_strategy:
              type: string
              enum:
                - after
                - before
                - contains
              description: Prompt extract strategy
            prompt_extract_length:
              type: string
              enum:
                - short
                - medium
                - long
              description: Prompt extract length
            keyword_notes_enabled:
              type: boolean
              description: Keyword notes enabled
        prompts:
          type: array
          description: Prompts of the smart category
          items:
            type: string
        keywords:
          type: array
          description: Keywords of the smart category
          items:
            type: string
    smart_category_settings_response:
      type: object
      required:
        - name
        - settings
        - prompts
        - keywords
      properties:
        name:
          type: string
          description: Name of the smart category
        settings:
          type: object
          description: Settings of the smart category
          properties:
            uuid:
              type: string
              format: uuid
              description: UUID of the smart category
            aug_notes_enabled:
              type: boolean
              description: Bookmark and transcript highlight
            prompt_extract_strategy:
              type: string
              enum:
                - after
                - before
                - contains
              description: Prompt extract strategy
            prompt_extract_length:
              type: string
              enum:
                - short
                - medium
                - long
              description: Prompt extract length
            keyword_notes_enabled:
              type: boolean
              description: Keyword notes enabled
        prompts:
          type: array
          description: Prompts of the smart category
          items:
            type: string
        keywords:
          type: array
          description: Keywords of the smart category
          items:
            type: string
    smart_categories:
      type: object
      description: Smart Category Object
      properties:
        uuid:
          type: string
          format: uuid
          description: UUID of the custom category.

        name:
          type: string
          description: Name of the custom category.

        key:
          type: string
          description: Key of the custom category.

        keywords:
          type: array
          description: Keywords of the custom category.
          items:
            type: object
            description: Keyword object
            properties:
              uuid:
                type: string
                format: uuid
                description: Unique ID of the keyword.
              label:
                type: string
                description: Label of the the keyword.
                example: "Competitor"
              created:
                type: string
                format: "date-time"
                description: Creation date-time(UTC).
              custom_category:
                type: string
                format: uuid
                description: Unique ID of the custom category.
              variations:
                type: array
                description: Variations of the keyword.
                items:
                  type: string
                  description: Variation of the keyword.
                  example: "Competitor"
              is_primary:
                type: boolean
                description: Is primary keyword.
        prompts:
          type: array
          description: Prompts of the custom category.
          items:
            type: object
            description: Prompt object
            properties:
              uuid:
                type: string
                format: uuid
                description: Unique ID of the prompt.
              label:
                type: string
                description: Label of the the prompt.
                example: "How did you hear about us"
              created:
                type: string
                format: "date-time"
                description: Creation date-time(UTC).
              custom_category:
                type: string
                format: uuid
                description: Unique ID of the custom category.
              variations:
                type: array
                description: Variations of the prompt.
                items:
                  type: string
                  description: Variation of the prompt.
                  example: "How did you hear about us"
        settings:
          type: object
          description: Settings of the custom category.
          properties:
            aug_notes_enabled:
              type: boolean
              description: Augmented notes enabled.
            keyword_notes_enabled:
              type: boolean
              description: Keyword notes enabled.
            keyword_tracking_enabled:
              type: boolean
              description: Keyword tracking enabled.
            prompt_notes_enabled:
              type: boolean
              description: Prompt notes enabled.
            prompt_extract_strategy:
              type: string
              description: Prompt extract strategy.
            prompt_extract_length:
              type: string
              description: Prompt extract length.

        is_default:
          type: boolean
          description: Is default custom category.
    pagination_data:
      type: object
      required:
        - count
        - next
        - previous
      properties:
        count:
          type: integer
          description: Total number of records in result.
          minimum: 0
        next:
          type: string
          description: URL to the next page if available.
          nullable: true
          example: https://example.com/api/v1/meeting/?page=2
        previous:
          type: string
          description: URL to the previous page if available.
          nullable: true
          example: https://example.com/api/v1/meeting/?page=1
    recordings_200:
      type: object
      description: This api returns a video and audio recording download url.
      required:
        - uuid
        - meeting_uuid
      properties:
        meeting_uuid:
          type: string
          format: uuid
          description: Unique ID of the meeting.
        uuid:
          type: string
          format: uuid
          description: Unique ID of the recording.
        video_url:
          type: string
          format: url
          description: Signed url of video recording file.
        audio_url:
          type: string
          format: url
          description: Signed url of audio recording file.
        valid_till:
          type: string
          format: date-time
          description: expiry date of the video and audio recording download url
        message:
          type: string
          description: Response message
          example: "The request has been processed successfully."
    recordings_202:
      type: object
      description: This api returns a video and audio recording download url.
      required:
        - uuid
        - meeting_uuid
      properties:
        meeting_uuid:
          type: string
          format: uuid
          description: Unique ID of the meeting.
        uuid:
          type: string
          format: uuid
          description: Unique ID of the recording.
        message:
          type: string
          description: Response message
          example: "The request has been received, your recording is being processed, recording will be sent via email at <email>"
    patch_call_request:
      type: object
      anyOf:
        - properties:
            additional_details:
              type: string
              description: Additional call metadata in JSON format
        - properties:
            is_voicemail:
              type: boolean
              description: Whether the call is a voicemail
        - properties:
            answered:
              type: boolean
              description: Whether the call was answered
        - properties:
            frm_name:
              type: string
              description: Name of the caller (from participant)
        - properties:
            to_name:
              type: string
              description: Name of the callee (to participant)
        - properties:
            subject:
              type: string
              description: Meeting subject/topic
        - properties:
            meeting_purpose_uuid:
              type: string
              format: uuid
              description: Unique ID of the meeting purpose/type
        - properties:
            meeting_outcome_uuid:
              type: string
              format: uuid
              description: Unique ID of the meeting outcome
        - properties:
            crm_association:
              description: CRM association object
              example:
              - crm_obj_id: '102721358755'
                crm_obj_type: contact
              - crm_obj_id: '30447071570'
                crm_obj_type: account
              - crm_obj_id: '34202467419'
                crm_obj_type: oppo
              properties:
                crm_obj_id:
                  description: Unique identifier for the CRM object
                  type: string
                crm_obj_type:
                  description: Type of CRM object
                  type: string
              type: array
    call_response:
      type: object
      properties:
        external_id:
          description: Unique id of the call from the dialer system like hubspot, twilio, zoom, etc.
          type: string
          maxLength: 255
        user_email:
          description: Email of the user who made or received the call. This should be an Avoma user's email. License for this user will be used to process the call.
          type: string
          format: email
          maxLength: 254
        organization:
          type: object
          properties:
            id:
              type: integer
              readOnly: true
            created:
              type: string
              format: date-time
              readOnly: true
            modified:
              type: string
              format: date-time
              readOnly: true
            uuid:
              type: string
              format: uuid
              readOnly: true
            name:
              type: string
              maxLength: 255
            domain:
              type: string
              maxLength: 255
            timezone:
              type: string
            is_marked_for_deletion:
              type: boolean
          required:
            - name
            - domain
          readOnly: true
        state:
          enum:
            - created
            - queued
            - inprogress
            - done
            - error
          type: string
          readOnly: true
        frm:
          description: Phone number from which call was made.
          type: string
          nullable: true
          maxLength: 255
          example: "+11234567890"
        frm_name:
          description: Name of the caller who made the call.
          type: string
          nullable: true
          maxLength: 255
        to:
          description: Phone number to which call was made.
          type: string
          nullable: true
          maxLength: 255
          example: "+12234567890"
        to_name:
          description: Name of the person to whom call was made.
          type: string
          nullable: true
          maxLength: 255
        start_at:
          description: Start time of the call.
          type: string
          format: date-time
          nullable: true
        end_at:
          description: End time of the call.
          type: string
          format: date-time
          nullable: true
        recording_url:
          description: URL of the recording of the call. This will be used to download the recording by avoma for processing, so should be a public URL.
          type: string
          nullable: true
          example: "https://example.com/recording.mp3"
        direction:
          description: Direction of the call, e.g. Inbound, Outbound
          type: string
          nullable: true
          maxLength: 255
          example: "Outbound"
        answered:
          description: Whether the call was answered, e.g true, false
          type: boolean
          nullable: true
          example: "true"
        additional_details:
          description: Additional details of the call. This should be a JSON object.
          type: string
          nullable: true
        meeting:
          type: object
          properties:
            id:
              type: integer
              readOnly: true
            created:
              type: string
              format: date-time
              readOnly: true
            modified:
              type: string
              format: date-time
              readOnly: true
            uuid:
              type: string
              format: uuid
              readOnly: true
            subject:
              type: string
              nullable: true
              maxLength: 512
            organizer_email:
              type: string
              format: email
              maxLength: 254
            external_id:
              type: string
              maxLength: 512
            state:
              enum:
                - tentative
                - confirmed
                - cancelled
                - inprogress
                - ended
                - error
              type: string
            start_at:
              type: string
              format: date-time
              nullable: true
            end_at:
              type: string
              format: date-time
              nullable: true
            location:
              type: string
              nullable: true
              maxLength: 512
            meeting_url:
              type: string
              nullable: true
            is_call:
              type: boolean
            is_internal:
              type: boolean
            is_dummy:
              type: boolean
            is_impromptu:
              type: boolean
            is_private:
              type: boolean
            is_disclaimer_added:
              type: boolean
            is_original:
              type: boolean
            is_split_processed:
              type: boolean
            original_model_counts:
              type: object
              nullable: true
            original_org_count:
              type: integer
              maximum: 2147483647
              minimum: -2147483648
            org_not_found:
              type: boolean
            organization:
              type: integer
              nullable: true
            recurring_master:
              type: integer
              nullable: true
            original_meeting:
              type: integer
              nullable: true
          required:
            - organizer_email
          readOnly: true
        is_voicemail:
          description: Indicates if the call is a voicemail.
          type: boolean
          default: false
        source:
          description: Lowercase string indicating the source of the call, e.g. zoom, zoomphone, twilio, phoneburner, ringcentral, aircall, etc.
          type: string
          nullable: true
          maxLength: 255
          example: "ringcentral"
        subject:
          description: Subject of the meeting associated with the call.
          type: string
          nullable: true
          maxLength: 512
          example: "Sales Call with John Doe"
        meeting_purpose_uuid:
          description: UUID of the meeting purpose/type associated with the call.
          type: string
          format: uuid
          nullable: true
          example: "123e4567-e89b-12d3-a456-426614174000"
        meeting_outcome_uuid:
          description: UUID of the meeting outcome associated with the call.
          type: string
          format: uuid
          nullable: true
          example: "123e4567-e89b-12d3-a456-426614174001"
        participants:
          type: array
          description: List of participants in the call. First entry should be of the prospect or lead with whom the call happened. This will be used in formulating the subject of the call in Avoma.
          items:
            type: object
            properties:
              email:
                type: string
                format: email
              name:
                type: string
                maxLength: 255
              crm_association:
                description: CRM association object
                example:
                - crm_obj_id: '102721358755'
                  crm_obj_type: contact
                - crm_obj_id: '30447071570'
                  crm_obj_type: account
                - crm_obj_id: '34202467419'
                  crm_obj_type: oppo
                properties:
                  crm_obj_id:
                    description: Unique identifier for the CRM object
                    type: string
                  crm_obj_type:
                    description: Type of CRM object
                    type: string
                type: array
            required:
              - email
          writeOnly: true
        crm_association:
          description: CRM association object
          example:
          - crm_obj_id: '102721358755'
            crm_obj_type: contact
          - crm_obj_id: '30447071570'
            crm_obj_type: account
          - crm_obj_id: '34202467419'
            crm_obj_type: oppo
          properties:
            crm_obj_id:
              description: Unique identifier for the CRM object
              type: string
            crm_obj_type:
              description: Type of CRM object
              type: string
          type: array
        required:
         - external_id
         - user_email
         - frm
         - to
         - start_at
         - recording_url
         - direction
         - source
         - participants
    bad_request_body:
      type: object
      required:
        - message
      properties:
        message:
          type: array
          items:
            type: string
          description: Error messages
          example:
            - "This field may not be blank."
    meeting_type_response:
      type: object
      description: Meeting Type Object
      required:
        - uuid
        - label
        - description
      properties:
        uuid:
          type: string
          format: uuid
          description: Unique ID of the meeting type.
        label:
          type: string
          maxLength: 64
          description: Label/name of the meeting type.
          example: "Discovery Call"
        description:
          type: string
          description: Description of the meeting type.
          example: "Initial discovery call with potential customers"

    meeting_type_request:
      type: object
      description: Meeting Type Request Object
      required:
        - label
        - description
      properties:
        label:
          type: string
          maxLength: 64
          description: Label/name of the meeting type.
          example: "Discovery Call"
        description:
          type: string
          description: Description of the meeting type.
          example: "Initial discovery call with potential customers"

    meeting_type_update_request:
      type: object
      description: Meeting Type Update Request Object
      properties:
        label:
          type: string
          maxLength: 64
          description: Label/name of the meeting type.
          example: "Discovery Call"
        description:
          type: string
          description: Description of the meeting type.
          example: "Initial discovery call with potential customers"

    meeting_outcome_response:
      type: object
      description: Meeting Outcome Object
      required:
        - uuid
        - label
        - description
      properties:
        uuid:
          type: string
          format: uuid
          description: Unique ID of the meeting outcome.
        label:
          type: string
          maxLength: 64
          description: Label/name of the meeting outcome.
          example: "Qualified"
        description:
          type: string
          description: Description of the meeting outcome.
          example: "Lead is qualified and ready for next steps"

    meeting_outcome_request:
      type: object
      description: Meeting Outcome Request Object
      required:
        - label
        - description
      properties:
        label:
          type: string
          maxLength: 64
          description: Label/name of the meeting outcome.
          example: "Qualified"
        description:
          type: string
          description: Description of the meeting outcome.
          example: "Lead is qualified and ready for next steps"

    meeting_outcome_update_request:
      type: object
      description: Meeting Outcome Update Request Object
      properties:
        label:
          type: string
          maxLength: 64
          description: Label/name of the meeting outcome.
          example: "Qualified"
        description:
          type: string
          description: Description of the meeting outcome.
          example: "Lead is qualified and ready for next steps"
    engagement_metric_base:
      type: object
      description: Base engagement metric with value
      properties:
        value:
          type: number
          nullable: true
          description: Metric value

    engagement_list_item:
      type: object
      description: User engagement metrics
      properties:
        user_email:
          type: string
          format: email
          description: Email address of the user
        conversations_listened:
          allOf:
            - $ref: "#/components/schemas/engagement_metric_base"
            - description: Number of conversations listened to
        snippets_listened:
          allOf:
            - $ref: "#/components/schemas/engagement_metric_base"
            - description: Number of snippets listened to
        conversations_shared:
          allOf:
            - $ref: "#/components/schemas/engagement_metric_base"
            - description: Number of conversations shared
        conversations_commented:
          allOf:
            - $ref: "#/components/schemas/engagement_metric_base"
            - description: Number of conversations with comments
        total_comments:
          allOf:
            - $ref: "#/components/schemas/engagement_metric_base"
            - description: Total number of comments made
        conversations_listened_duration:
          allOf:
            - $ref: "#/components/schemas/engagement_metric_base"
            - description: Total duration listened in seconds
        conversations_listened_percent:
          allOf:
            - $ref: "#/components/schemas/engagement_metric_base"
            - description: Percentage of conversations listened to

    engagement_user_item:
      type: object
      description: Participant engagement metrics for a specific user
      properties:
        participant_email:
          type: string
          format: email
          description: Email address of the participant
        conversations_listened:
          allOf:
            - $ref: "#/components/schemas/engagement_metric_base"
            - description: Number of conversations listened to
        snippets_listened:
          allOf:
            - $ref: "#/components/schemas/engagement_metric_base"
            - description: Number of snippets listened to
        conversations_shared:
          allOf:
            - $ref: "#/components/schemas/engagement_metric_base"
            - description: Number of conversations shared
        conversations_commented:
          allOf:
            - $ref: "#/components/schemas/engagement_metric_base"
            - description: Number of conversations with comments
        total_comments:
          allOf:
            - $ref: "#/components/schemas/engagement_metric_base"
            - description: Total number of comments made
        avg_playback_speed:
          allOf:
            - $ref: "#/components/schemas/engagement_metric_base"
            - description: Average playback speed
        conversations_listened_duration:
          allOf:
            - $ref: "#/components/schemas/engagement_metric_base"
            - description: Total duration listened in seconds
        conversations_listened_percent:
          allOf:
            - $ref: "#/components/schemas/engagement_metric_base"
            - description: Percentage of conversations listened to

    engagement_list_response:
      allOf:
        - $ref: "#/components/schemas/pagination_data"
        - type: object
          required:
            - results
          properties:
            results:
              type: array
              description: Array of engagement metrics
              items:
                oneOf:
                  - $ref: "#/components/schemas/engagement_list_item"
                  - $ref: "#/components/schemas/engagement_user_item"

    engagement_summary_response:
      type: object
      description: Summary statistics for engagement metrics
      properties:
        conversations_listened:
          allOf:
            - $ref: "#/components/schemas/engagement_metric_base"
            - description: Total conversations listened
        snippets_listened:
          allOf:
            - $ref: "#/components/schemas/engagement_metric_base"
            - description: Total snippets listened
        conversations_shared:
          allOf:
            - $ref: "#/components/schemas/engagement_metric_base"
            - description: Total conversations shared
        conversations_commented:
          allOf:
            - $ref: "#/components/schemas/engagement_metric_base"
            - description: Total conversations with comments
        total_comments:
          allOf:
            - $ref: "#/components/schemas/engagement_metric_base"
            - description: Total comments made
        avg_playback_speed:
          allOf:
            - $ref: "#/components/schemas/engagement_metric_base"
            - description: Average playback speed
        conversations_listened_duration:
          allOf:
            - $ref: "#/components/schemas/engagement_metric_base"
            - description: Total listening duration (seconds)
        conversations_listened_percent:
          allOf:
            - $ref: "#/components/schemas/engagement_metric_base"
            - description: Average percentage listened
    external_snippet:
      type: object
      description: Meeting snippet object
      required:
        - meeting_uuid
        - title
        - description
        - start_time
        - end_time
        - duration
        - speakers
        - all_participants
        - source
        - created
        - modified
      properties:
        meeting_uuid:
          type: string
          format: uuid
          description: UUID of the meeting this snippet belongs to.
          example: "123e4567-e89b-12d3-a456-426614174000"
        title:
          type: string
          description: Title of the snippet.
          example: "Product Demo Discussion"
        description:
          type: string
          description: Description/content of the snippet.
          nullable: true
          example: "Customer expressed interest in the new features"
        start_time:
          type: integer
          description: Start time of the snippet in seconds from the beginning of the recording.
          example: 120
        end_time:
          type: integer
          description: End time of the snippet in seconds from the beginning of the recording.
          example: 180
        duration:
          type: number
          format: float
          description: Duration of the snippet in seconds.
          example: 60
        source:
          type: string
          enum:
            - ai_generated
            - user_created
          description: >
            Source of the snippet:

            - `ai_generated`: Snippet was automatically generated by AI.

            - `user_created`: Snippet was manually created by a user.
          example: "ai_generated"
        speakers:
          type: object
          description: Object containing speakers associated with this snippet, keyed by speaker number.
          additionalProperties:
            type: object
            required:
              - email
              - speaker_number
              - is_rep
            properties:
              email:
                type: string
                format: email
                description: Email of the speaker.
                example: "john.doe@example.com"
              name:
                type: string
                description: Name of the speaker.
                nullable: true
                example: "John Doe"
              speaker_number:
                type: integer
                description: Speaker number identifier.
                example: 0
              is_rep:
                type: boolean
                description: Whether the speaker is a representative.
                example: true
