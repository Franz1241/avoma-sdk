          type: array
          description: All participants in the meeting.
          items:
            type: object
            required:
              - email
            properties:
              name:
                type: string
                description: Name of the participant.
                nullable: true
                example: "John Doe"
              email:
                type: string
                format: email
                description: Email of the participant.
                example: "john.doe@example.com"
        created:
          type: string
          format: "date-time"
          description: Creation date-time(UTC) of the snippet.
        modified:
          type: string
          format: "date-time"
          description: Last modification date-time(UTC) of the snippet.
    disable_reason:
      type: string
      nullable: true
      description: >
        Reason why recording was disabled (if applicable). Possible values:

        ### **General states:**
        
        - `"None"`: No disable reason (recording enabled)
        
        - `"User Enabled"`: User enabled recording
        
        - `"User Disabled"`: User disabled recording
        
        - `"Automation Enabled"`: Automation enabled recording
        
        - `"Automation Disabled"`: Automation disabled recording
        
        - `"Meeting Created"`: Meeting created
        
        - `"Email Invite Meeting Created"`: Meeting created via email invite

        ###**Conference/Connection issues:**
        
        - `"Missing conferencing details"`: Conferencing details not found or incorrect
        
        - `"Unsupported conferencing provider"`: Conferencing provider not supported
        
        - `"Conference Not Found"`: Conference not found
        
        - `"Cannot Dial Conference"`: Cannot dial conference
        
        - `"Non Dialable Service"`: Non-dialable service

        ### **Filter-based reasons:**
        
        - `"Recording limits exceeded"`: Recording limits exceeded
        
        - `"Blacklisted domain"`: Participants from restricted or blacklisted domain
        
        - `"Recording license missing"`: No participants have recording feature or license
        
        - `"Recording disabled"`: Recording was disabled
        
        - `"Recording setting disabled"`: Recording setting disabled for meeting type
        
        - `"Meeting invite not accepted"`: No one has accepted the meeting invite
        
        - `"Parallel meetings"`: Multiple parallel meetings for the same organizer
        
        - `"Limits Meeting Filter"`: Limits meeting filter applied
        
        - `"Restricted Domains And Emails Meeting Filter"`: Restricted domains and emails meeting filter
        
        - `"Recording Feature Filter"`: Recording feature filter
        
        - `"Phonebot Feature Filter"`: Phonebot feature filter
        
        - `"Internal Meeting Filter"`: Internal meeting filter
        
        - `"External Meeting Filter"`: External meeting filter
        
        - `"Accepted Meeting Filter"`: Accepted meeting filter
        
        - `"Duplicate Meeting Filter"`: Duplicate meeting filter
        
        - `"Recurring Meeting Recording Action Filter"`: Recurring meeting recording action filter
        
        - `"Do Not Dial Meeting Filter"`: Do not dial meeting filter
        
        - `"Organizer Only Meeting Filter"`: Organizer only meeting filter
        
        - `"Meeting Link Filter"`: Meeting link filter
        
        - `"Automation disabled"`: Meeting was not recorded because recording was disabled by automation
        
        - `"Do not dial filter"`: Meeting was not recorded because it was filtered by the do not dial setting
        
        - `"Organizer only filter"`: Meeting was not recorded because it was filtered by the organizer only setting
        
        - `"Meeting link filter"`: Meeting was not recorded because it was filtered by the meeting link setting

        ### **Bot/Recording issues:**
        
        - `"Bot denied entry"`: Avoma assistant (bot) was denied entry
        
        - `"Bot timed out waiting for approval"`: Bot timed out waiting for approval
        
        - `"Bot timed out waiting for meeting host"`: Bot timed out waiting for meeting host
        
        - `"No participants"`: No one joined the meeting
        
        - `"Host in another meeting"`: Host had a parallel meeting running

        ### **Recording processing issues:**
        
        - `"Silent recording"`: Recording has no audio or no one spoke
        
        - `"Recording too short"`: Recording is too short to be processed
        
        - `"Recording not received."`: Recording not received from provider
        
        - `"Recording Not Saved"`: Recording not saved in cloud
        
        - `"No recording found"`: No recording found
        
        - `"Recording error"`: Recording error occurred
        
        - `"Invalid recording details"`: Invalid recording details
        
        - `"Invalid video"`: Invalid video
        
        - `"Download Error"`: Download error
        
        - `"Download Failed"`: Download failed

        ### **Provider-specific issues:**
        
        - `"Zoom Meeting did not start"`: Zoom meeting did not start
        
        - `"Meeting Not Recorded"`: Meeting was not recorded (provider-specific)
        
        - `"Meeting Did Not Start"`: Meeting did not start (provider-specific)
        
        - `"MS Teams meeting did not start"`: MS Teams meeting did not start
        
        - `"MS Teams recording not received"`: MS Teams recording not received
        
        - `"MS Teams meeting not recorded"`: MS Teams meeting not recorded
        
        - `"Sign in required for meeting"`: Sign in required for meeting
        
        - `"Webinar meeting not supported"`: Webinar meeting not supported
        
        - `"No eligible participant with recording limits"`: No eligible participant with recording limits

        ### **Other issues:**
        
        - `"Restricted domain"`: Restricted or blacklisted domain
        
        - `"Overlapping meeting"`: Overlapping meeting at the same time
        
        - `"Captcha required"`: Captcha required to join the meeting
        
        - `"No Avoma user in meeting"`: No Avoma user was present in the meeting
        
        - `null`: No disable reason information available.
      example: "Missing conferencing details"

